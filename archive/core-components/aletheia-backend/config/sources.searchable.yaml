version: 1
defaults:
  enabled: true
  type: rss
  fetch_interval_seconds: 600
  priority: 5
  per_domain:
    max_concurrency: 1
    min_delay_ms: 1200
    jitter_ms: 800
  retry:
    max_retries: 3
    base_backoff_seconds: 10
    max_backoff_seconds: 900
    retry_on_status:
    - 408
    - 429
    - 500
    - 502
    - 503
    - 504
  stop_conditions:
    pause_after_consecutive_failures: 12
  content_policy:
    fetch_full_article: false
    max_items_per_fetch: 50
    store_fields:
    - title
    - link
    - pubDate
    - description
    - source_id
    - category
groups:
- group_id: cn_official
  name: 央媒与官方信息
  sources:
  - source_id: people_politics
    name: 人民网-时政
    category: 时政
    url: http://www.people.com.cn/rss/politics.xml
    priority: 2
  - source_id: chinanews_scroll
    name: 中国新闻网-即时滚动
    category: 综合/快讯
    url: https://www.chinanews.com.cn/rss/scroll-news.xml
    priority: 2
  - source_id: chinanews_china
    name: 中国新闻网-时政(国内)
    category: 时政
    url: https://www.chinanews.com.cn/rss/china.xml
    priority: 2
  - source_id: chinanews_society
    name: 中国新闻网-社会
    category: 社会
    url: https://www.chinanews.com.cn/rss/society.xml
    priority: 3
meta:
  generated_from_audit: docs/rss_searchability_report.json
  source_count: 4
