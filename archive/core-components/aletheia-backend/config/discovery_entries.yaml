# Discovery Entries Configuration
# 发现入口配置清单 - 用于证据库发现层
# Based on: 面向事实核查与舆情监测的中国新闻与社媒 Search 证据库技术方案

version: 2
metadata:
  updated_at: "2026-03-04"
  description: "Search/热榜/话题流发现入口配置，按三层分级：S/A/B/C"

defaults:
  enabled: true
  frequency_seconds: 900
  lang: zh
  pool: evidence  # evidence | background
  min_delay_ms: 1200
  max_concurrency: 1
  jitter_ms: 800
  max_retries: 3
  retry_on_status: [408, 429, 500, 502, 503, 504]
  requires_playwright: false
  is_static: true

groups:
  # ============================================================
  # S级：权威媒体/官方机构 (可核查性优先)
  # ============================================================
  - group_id: tier_s_official
    name: "S级 - 权威媒体与官方机构"
    defaults_override:
      tier: S
      pool: evidence
      frequency_seconds: 600
      priority: 1
    sources:
      # 央视搜索
      - source_id: cctv_search
        platform: cctv
        name: "央视网站内搜索"
        domain: search.cctv.com
        discovery_mode: search
        url_template: "https://search.cctv.com/?qtext={{keyword}}"
        priority: P0
        frequency_seconds: 600  # 热点词 5-10分钟
        parser_id: cctv_search_v1

      # 人民网搜索
      - source_id: people_search
        platform: people
        name: "人民网站内搜索"
        domain: search.people.cn
        discovery_mode: search
        url_template: "https://search.people.cn/s/?keyword={{keyword}}"
        priority: P0
        frequency_seconds: 900  # 10-30分钟
        parser_id: people_search_v1

      # 新华网搜索
      - source_id: xinhua_search
        platform: xinhua
        name: "新华网站内搜索"
        domain: so.news.cn
        discovery_mode: search
        url_template: "https://so.news.cn/#search/{{keyword}}"
        priority: P0
        frequency_seconds: 900
        parser_id: xinhua_search_v1

      # 中国政府网
      - source_id: gov_feed
        platform: gov
        name: "国务院要闻"
        domain: www.gov.cn
        discovery_mode: feed
        url_template: "https://www.gov.cn/yaowen/index.htm"
        priority: P0
        frequency_seconds: 1800
        parser_id: gov_feed_v1

      # 国家统计局
      - source_id: stats_feed
        platform: stats
        name: "国家统计局最新发布"
        domain: www.stats.gov.cn
        discovery_mode: feed
        url_template: "https://www.stats.gov.cn/sj/zxfb/"
        priority: P0
        frequency_seconds: 1800

  # ============================================================
  # B级：门户/商业媒体 (覆盖与传播优先)
  # ============================================================
  - group_id: tier_b_portals
    name: "B级 - 门户与商业媒体"
    defaults_override:
      tier: B
      pool: evidence
      frequency_seconds: 1200
      priority: 2
    sources:
      # 搜狐搜索
      - source_id: sohu_search
        platform: sohu
        name: "搜狐站内搜索"
        domain: search.sohu.com
        discovery_mode: search
        url_template: "https://search.sohu.com/?keyword={{keyword}}"
        priority: P1
        frequency_seconds: 900
        parser_id: sohu_search_v1

      # 凤凰网
      - source_id: ifeng_search
        platform: ifeng
        name: "凤凰网站内搜索"
        domain: search.ifeng.com
        discovery_mode: search
        url_template: "https://search.ifeng.com/sofeng/search.action?q={{keyword}}"
        priority: P1
        frequency_seconds: 900

      # 网易新闻
      - source_id: netease_search
        platform: netease
        name: "网易站内搜索"
        domain: search.163.com
        discovery_mode: search
        url_template: "https://search.163.com/search?q={{keyword}}"
        priority: P1
        frequency_seconds: 1200

  # ============================================================
  # C级：社媒与内容平台 (舆情与扩散优先)
  # ============================================================
  - group_id: tier_c_social_weibo
    name: "C级 - 微博生态"
    defaults_override:
      tier: C
      pool: evidence
      frequency_seconds: 300
      priority: 1
      requires_playwright: false
      is_static: false  # 微博多为动态加载
    sources:
      # 微博关键词搜索
      - source_id: weibo_search
        platform: weibo
        name: "微博关键词搜索"
        domain: s.weibo.com
        discovery_mode: search
        url_template: "https://s.weibo.com/weibo?q={{keyword}}&page={{page}}"
        priority: P0
        frequency_seconds: 300  # 热搜 1-3分钟，常规 10-20分钟
        api_endpoint: "https://m.weibo.cn/api/container/getIndex?containerid=100103type%3D1%26q%3D{{keyword}}"
        parser_id: weibo_search_v1

      # 微博热搜榜
      - source_id: weibo_hot
        platform: weibo
        name: "微博热搜榜"
        domain: s.weibo.com
        discovery_mode: hot
        url_template: "https://s.weibo.com/top/summary"
        priority: P0
        frequency_seconds: 180  # 1-3分钟
        parser_id: weibo_hot_v1

      # 微博话题
      - source_id: weibo_topic
        platform: weibo
        name: "微博话题页"
        domain: weibo.com
        discovery_mode: topic
        url_template: "https://weibo.com/p/100808/topic/{{topic_id}}"
        priority: P1
        frequency_seconds: 600

  - group_id: tier_c_social_zhihu
    name: "C级 - 知乎生态"
    defaults_override:
      tier: C
      pool: evidence
      frequency_seconds: 300
      priority: 1
      requires_playwright: false
    sources:
      # 知乎搜索
      - source_id: zhihu_search
        platform: zhihu
        name: "知乎关键词搜索"
        domain: www.zhihu.com
        discovery_mode: search
        url_template: "https://www.zhihu.com/search?type=content&q={{keyword}}"
        priority: P0
        frequency_seconds: 600  # 热搜 3-5分钟，常规 15-30分钟
        api_endpoint: "https://www.zhihu.com/api/v4/search_v3?t=general&q={{keyword}}&offset=0&limit=20"
        parser_id: zhihu_search_v1

      # 知乎热搜榜
      - source_id: zhihu_hot
        platform: zhihu
        name: "知乎热搜榜"
        domain: www.zhihu.com
        discovery_mode: hot
        url_template: "https://www.zhihu.com/topsearch"
        priority: P0
        frequency_seconds: 300
        parser_id: zhihu_hot_v1

      # 知乎热点话题
      - source_id: zhihu_topic
        platform: zhihu
        name: "知乎热点话题"
        domain: www.zhihu.com
        discovery_mode: topic
        url_template: "https://www.zhihu.com/topic/{{topic_id}}/hot"
        priority: P1
        frequency_seconds: 600

  - group_id: tier_c_social_bilibili
    name: "C级 - B站生态"
    defaults_override:
      tier: C
      pool: evidence
      frequency_seconds: 300
      priority: 1
      requires_playwright: false
      is_static: false
    sources:
      # B站搜索
      - source_id: bilibili_search
        platform: bilibili
        name: "B站关键词搜索"
        domain: search.bilibili.com
        discovery_mode: search
        url_template: "https://search.bilibili.com/all?keyword={{keyword}}&page={{page}}"
        priority: P0
        frequency_seconds: 600
        api_endpoint: "https://api.bilibili.com/x/web-interface/search/type?keyword={{keyword}}&page={{page}}"
        parser_id: bilibili_search_v1

      # B站热搜榜
      - source_id: bilibili_hot
        platform: bilibili
        name: "B站热搜榜"
        domain: www.bilibili.com
        discovery_mode: hot
        url_template: "https://www.bilibili.com/blackboard/activity-trending-topic.html"
        priority: P0
        frequency_seconds: 300
        parser_id: bilibili_hot_v1

      # B站热门
      - source_id: bilibili_popular
        platform: bilibili
        name: "B站热门"
        domain: www.bilibili.com
        discovery_mode: hot
        url_template: "https://www.bilibili.com/v/popular/rank/all/"
        priority: P0
        frequency_seconds: 300

      # B站趋势洞察
      - source_id: bilibili_trends
        platform: bilibili
        name: "B站趋势洞察"
        domain: trends.bilibili.com
        discovery_mode: hot
        url_template: "https://trends.bilibili.com/content"
        priority: P1
        frequency_seconds: 600

  - group_id: tier_c_social_toutiao
    name: "C级 - 今日头条生态"
    defaults_override:
      tier: C
      pool: evidence
      frequency_seconds: 300
      priority: 1
      requires_playwright: true  # 头条需要渲染
      is_static: false
    sources:
      # 头条搜索
      - source_id: toutiao_search
        platform: toutiao
        name: "今日头条搜索"
        domain: www.toutiao.com
        discovery_mode: search
        url_template: "https://www.toutiao.com/search/?keyword={{keyword}}&source=input"
        priority: P0
        frequency_seconds: 300  # 热点词 3-5分钟，常规 15-30分钟
        parser_id: toutiao_search_v1

      # 头条热榜
      - source_id: toutiao_hot
        platform: toutiao
        name: "今日头条热榜"
        domain: www.toutiao.com
        discovery_mode: hot
        url_template: "https://www.toutiao.com/c/user/token/"
        priority: P0
        frequency_seconds: 300

  - group_id: tier_c_social_douyin
    name: "C级 - 抖音生态 (高风险)"
    defaults_override:
      tier: C
      pool: background  # 抖音风控强，降级为背景源
      frequency_seconds: 300
      priority: 2
      requires_playwright: true
      is_static: false
    sources:
      # 抖音热榜
      - source_id: douyin_hot
        platform: douyin
        name: "抖音热榜"
        domain: www.douyin.com
        discovery_mode: hot
        url_template: "https://www.douyin.com/hot"
        priority: P1  # 降级，高风险
        frequency_seconds: 300
        note: "强风控平台，建议只做热榜发现，优先商务/授权数据源"
        parser_id: douyin_hot_v1

  - group_id: tier_c_social_weixin
    name: "C级 - 公众号生态 (合规优先)"
    defaults_override:
      tier: C
      pool: background
      frequency_seconds: 1800
      priority: 2
    sources:
      # 搜狗微信搜索
      - source_id: weixin_sogou_search
        platform: weixin
        name: "搜狗微信搜索"
        domain: weixin.sogou.com
        discovery_mode: search
        url_template: "https://weixin.sogou.com/weixin?type=2&s_from=input&query={{keyword}}"
        priority: P1
        frequency_seconds: 1800  # 15-60分钟
        note: "公众号全文抓取版权与风控敏感，建议优先获取文章URL+标题+时间作为证据索引"
        parser_id: weixin_sogou_v1

  # ============================================================
  # 补充型发现层：RSSHub / SearXNG
  # ============================================================
  - group_id: supplementary_rsshub
    name: "补充源 - RSSHub 路由"
    defaults_override:
      tier: B
      pool: background
      frequency_seconds: 600
      priority: 3
      is_static: true
    sources:
      - source_id: rsshub_weibo_hot
        platform: weibo
        name: "RSSHub - 微博热搜"
        domain: rsshub.app
        discovery_mode: feed
        url_template: "https://rsshub.app/weibo/search/hot"
        priority: P2

      - source_id: rsshub_zhihu_hot
        platform: zhihu
        name: "RSSHub - 知乎热榜"
        domain: rsshub.app
        discovery_mode: feed
        url_template: "https://rsshub.app/zhihu/hot"
        priority: P2

      - source_id: rsshub_bilibili_rank
        platform: bilibili
        name: "RSSHub - B站排行榜"
        domain: rsshub.app
        discovery_mode: feed
        url_template: "https://rsshub.app/bilibili/ranking/0/3"
        priority: P2

      - source_id: rsshub_toutiao_hot
        platform: toutiao
        name: "RSSHub - 头条热榜"
        domain: rsshub.app
        discovery_mode: feed
        url_template: "https://rsshub.app/toutiao/hot"
        priority: P2

  - group_id: supplementary_searxng
    name: "补充源 - SearXNG 搜索引擎"
    defaults_override:
      tier: B
      pool: background
      frequency_seconds: 1200
      priority: 3
    sources:
      - source_id: searxng_site_search
        platform: searxng
        name: "SearXNG 站点限定搜索"
        domain: searx.be
        discovery_mode: search
        url_template: "https://searx.be/search?q=site:{{site}}+{{keyword}}&format=json"
        priority: P3
        note: "当目标站内搜索不可用时，通过搜索引擎做 site: 限定补充发现"

  # ============================================================
  # 国际背景源
  # ============================================================
  - group_id: international_background
    name: "国际背景补充源"
    defaults_override:
      tier: B
      pool: background
      frequency_seconds: 1800
      priority: 3
      lang: en
    sources:
      - source_id: reuters_world
        platform: reuters
        name: "Reuters World"
        domain: www.reuters.com
        discovery_mode: feed
        url_template: "https://www.reuters.com/world/"
        priority: P3

      - source_id: bbc_world
        platform: bbc
        name: "BBC World"
        domain: www.bbc.com
        discovery_mode: feed
        url_template: "https://www.bbc.com/news/world"
        priority: P3

      - source_id: guardian_world
        platform: guardian
        name: "Guardian World"
        domain: www.theguardian.com
        discovery_mode: feed
        url_template: "https://www.theguardian.com/world"
        priority: P3

      - source_id: ap_news
        platform: ap
        name: "AP News"
        domain: apnews.com
        discovery_mode: feed
        url_template: "https://apnews.com/"
        priority: P3

# ============================================================
# 关键词计划模板
# ============================================================
keyword_plans:
  - plan_id: hot_events
    name: "热点事件监控"
    keywords_source: dynamic  # 从热搜/热榜动态获取
    sources: [weibo_hot, zhihu_hot, bilibili_hot, douyin_hot, toutiao_hot]
    frequency_seconds: 300

  - plan_id: fact_check
    name: "事实核查关键词"
    keywords_source: static
    keywords:
      - "辟谣"
      - "澄清"
      - "不实信息"
      - "谣言"
      - "虚假"
    sources: [cctv_search, people_search, xinhua_search, weibo_search, zhihu_search]
    frequency_seconds: 600

  - plan_id: entity_monitoring
    name: "人物机构监控"
    keywords_source: config
    keywords_file: config/keywords/entities.yaml
    sources: [weibo_search, zhihu_search, bilibili_search]
    frequency_seconds: 900