# spam_rules.yaml
version: 1

spam_scoring:
  base: 0
  cap: 100

rules:
  - id: contains_contact
    score: 40
    regex_any:
      - "(微信|vx|V信|加我|公众号|QQ群|群号)"
      - "(\\b1\\d{10}\\b)"          # 手机号
      - "([Qq]{2}:?\\s*\\d{5,12})"  # QQ
      - "(https?://\\S+|www\\.\\S+)"

  - id: template_phrase
    score: 18
    keywords_any: ["带节奏", "资本", "恰饭", "严查", "必须严惩", "支持国家", "不信谣不传谣", "境外势力", "反转了", "水军真多"]

  - id: very_short
    score: 10
    min_len: 1
    max_len: 5

  - id: very_long
    score: 8
    min_len: 400

  - id: dup_high
    score: 25
    similarity:
      method: simhash
      hamming_max: 3

  - id: burst_window
    score: 15
    burst:
      window_minutes: 5
      min_comments_in_window: 30

cluster_rules:
  - id: cluster_dominant
    score: 15
    dominant_ratio: 0.10     # 某相似簇占比超过10%

output:
  flags_field: spam_flags
  score_field: spam_score
