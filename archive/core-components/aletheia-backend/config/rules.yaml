# rules.yaml
version: 1

# 1) 总体策略：先快后深
pipeline:
  stage_a_fast_summary:
    input_fields: [title, description]
    output: fast_summary
    max_chars: 1200

  stage_b_deep_summary:
    enabled: true
    # 只有命中高价值条件才抓正文
    require_high_value: true
    # 抓正文前的最小延迟（避免刚发布就触发风控）
    min_age_seconds: 90
    # 抓正文失败时的降级策略
    fallback_to_fast_summary: true

# 2) 高价值打分：>= threshold 才抓正文
scoring:
  threshold: 60

  # 默认权重（可按你们业务调）
  weights:
    source_priority: 3            # 来自 sources.yaml 的 priority（数值越小越重要）
    keyword_match: 6
    category_boost: 4
    breaking_news_patterns: 8
    policy_data_sources: 8
    recency: 6
    length_signal: 1
    duplication_penalty: -10

  # 2.1 按来源优先级加分（priority 越小越重要）
  source_priority_points:
    priority_1_2: 20
    priority_3_4: 12
    priority_5_6: 6
    priority_7_8: 2
    priority_9_10: 0

  # 2.2 分类加分（更“重要/可分析”的类优先做深摘要）
  category_points:
    政策: 20
    数据/统计: 18
    时政: 14
    国际: 12
    财经: 12
    社会: 8
    科技: 8
    汽车: 4
    教育: 4
    健康: 6
    娱乐: 2
    体育: 2
    游戏: 2
    生活: 1
    星座: 0
    母婴: 1
    旅游: 1

  # 2.3 关键词（你们可以塞行业词/竞品词/项目名）
  keyword_sets:
    # A类：强触发（命中就很值得抓正文）
    strong:
      points: 18
      any:
        - "国务院"
        - "国家统计局"
        - "发布会"
        - "通报"
        - "公告"
        - "征求意见"
        - "条例"
        - "办法"
        - "指导意见"
        - "白皮书"
        - "报告"
        - "数据"
        - "同比"
        - "环比"
        - "CPI"
        - "PPI"
        - "GDP"
        - "PMI"
        - "降准"
        - "降息"
        - "财政"
        - "央行"
        - "监管"
        - "处罚"
        - "立案"
        - "辟谣"
        - "谣言"
        - "紧急"
        - "突发"
        - "地震"
        - "火灾"
        - "事故"
        - "疫情"

    # B类：业务相关（按你们产品可扩）
    business:
      points: 12
      any:
        - "融资"
        - "IPO"
        - "收购"
        - "并购"
        - "裁员"
        - "财报"
        - "营收"
        - "利润"
        - "亏损"
        - "订单"
        - "供应链"
        - "出口"
        - "关税"
        - "制裁"
        - "芯片"
        - "大模型"
        - "人工智能"
        - "AI"
        - "算力"
        - "数据中心"
        - "机器人"
        - "自动驾驶"
        - "电动车"
        - "电池"
        - "新能源"
        - "药品"
        - "临床"
        - "医保"

    # C类：低优先（娱乐八卦/纯生活类默认不抓正文）
    low_value:
      points: -8
      any:
        - "星座"
        - "运势"
        - "八卦"
        - "绯闻"
        - "穿搭"
        - "测一测"
        - "速看"
        - "盘点"
        - "最全"
        - "合集"

  # 2.4 突发/权威表达模式（正则）
  breaking_patterns:
    points: 16
    regex_any:
      - "(突发|刚刚|紧急|快讯|最新|现场)"
      - "(通报|公告|辟谣|回应|澄清)"
      - "(发布会|新闻发布会|记者会)"
      - "(地震|火灾|爆炸|坍塌|事故|伤亡)"

  # 2.5 时效性：越新越值得抓正文
  recency_points:
    within_15_min: 12
    within_1_hour: 10
    within_6_hours: 6
    within_24_hours: 3
    older: 0

  # 2.6 内容长度信号（RSS description 太短时抓正文可能更有价值）
  length_signal:
    description_chars_lt_120: 6
    description_chars_120_400: 3
    description_chars_gt_400: 0

  # 2.7 去重惩罚
  duplication:
    # 同一 canonical / normalized_url 在最近窗口出现过，就降分（避免重复抓正文）
    window_hours: 24
    penalty: -20

# 3) 抓正文增强摘要的条件与限制
deep_fetch:
  # 满足以下任一条件会“强制抓正文”（即使得分略低也抓）
  force_fetch_if:
    any_category_in: ["政策", "数据/统计"]
    any_source_id_in: ["gov_policy_latest", "stats_release", "stats_interpret"]
    title_regex_any:
      - "(征求意见|条例|办法|指导意见|白皮书|报告)"
      - "(CPI|PPI|GDP|PMI|降准|降息)"
  # 永不抓正文（即使得分高也不抓，避免无意义成本）
  never_fetch_if:
    any_category_in: ["星座"]
    title_regex_any:
      - "(测一测|运势|盘点|合集|最全)"

  # 正文抓取策略
  fetch_order: [http, playwright]      # 先 http 后 playwright 兜底
  max_article_fetches_per_domain_per_hour: 60
  max_article_fetches_total_per_hour: 1500

  # 正文抽取失败处理
  on_extraction_fail:
    action: degrade
    degrade_to: fast_summary
    mark_reason: "extract_fail"

# 4) 反风控：自动降级/降频/暂停
anti_blocking:
  status_policies:
    "429":
      action: backoff_and_degrade
      backoff_multiplier: 2.0
      degrade_to: fast_summary
    "403":
      action: degrade_and_reduce_frequency
      degrade_to: fast_summary
      reduce_fetch_interval_factor: 2.0
    "503":
      action: backoff
      backoff_multiplier: 1.5

  captcha_detection:
    # 只做“检测并放弃/降级”，不做对抗
    keywords_any:
      - "验证码"
      - "安全验证"
      - "请输入图形验证码"
      - "人机验证"
      - "访问过于频繁"
    action: pause_source
    pause_hours: 24

# 5) 输出格式（确保“保留链接”与可追溯）
output:
  record_schema:
    required_fields:
      - source_id
      - category
      - title
      - link
      - published_at
      - retrieved_at
      - summary
      - summary_level            # fast | deep
    optional_fields:
      - canonical_url
      - evidence_quotes
      - outgoing_links
      - score_breakdown
      - fetch_trace
