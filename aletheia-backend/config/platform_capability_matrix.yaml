# Platform Capability Matrix
# 平台能力矩阵 - 单一真相配置
# Version: v1.1
# Updated: 2026-03-04
# Based on Phase 1 diagnosis results

platforms:
  # ==================== 稳定平台 (Tier 1) ====================
  xinhua:
    tier: major_media
    lang: zh
    discovery_mode: rss
    search_mode: native
    content_mode: direct_article
    trusted_domains:
      - xinhuanet.com
      - news.cn
      - xinhua.net
    timeout_ms: 15000
    retry_policy:
      max_retries: 3
      backoff_base: 1.0
    enabled_in_evidence_pool: true
    status: stable
    notes: "新华网RSS可用，但部分端点过期"
    rss_urls:
      - "http://www.xinhuanet.com/world/news_world.xml"
      - "http://www.xinhuanet.com/local/news_local.xml"
    issues:
      - "部分RSS端点返回404"
      - "需要定期验证RSS可用性"

