  # ==================== RSS池 (需要重建) ====================
  rss_pool:
    tier: background
    lang: mixed
    discovery_mode: rss
    search_mode: local_index_only
    content_mode: direct_article
    trusted_domains: []
    timeout_ms: 10000
    retry_policy:
      max_retries: 2
      backoff_base: 1.0
    enabled_in_evidence_pool: false
    status: observe
    issues:
      - "延迟过高"
      - "空结果率高"
    config:
      RSS_POOL_SEARCH_SKIP_NETWORK_IF_LOCAL_ENOUGH: true
      RSS_POOL_LOCAL_INDEX_LOOKBACK_DAYS: 30
      RSS_POOL_LOCAL_INDEX_MAX_CANDIDATES: 120

# ==================== 状态定义 ====================
status_definitions:
  stable:
    description: "RSS/API稳定可用，内容实时更新"
    action: "保持配置，加入证据池"
  observe:
    description: "有数据但需要验证"
    action: "监控但不加入证据池"
  degraded:
    description: "数据源不可用或过期"
    action: "寻找替代方案"
  disabled:
    description: "连续多轮无证据"
    action: "禁用平台"

# ==================== 质量阈值 ====================
quality_thresholds:
  evidence_pool:
    min_items: 3
    min_keyword_hit_rate: 0.8
    min_entity_hit_rate: 0.8
    min_trusted_hit_rate: 0.9
  observe_pool:
    min_items: 1
    min_keyword_hit_rate: 0.5
    min_entity_hit_rate: 0.5

