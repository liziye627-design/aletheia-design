    status: stable
    notes: "澎湃新闻官方API可用，支持热搜和热门新闻"
    api_endpoints:
      - "https://cache.thepaper.cn/contentapi/wwwIndex/rightSidebar"
    crawler_type: "hot_news_api"

  peoples_daily:
