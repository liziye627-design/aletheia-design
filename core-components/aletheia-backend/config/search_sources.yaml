version: 1
defaults:
  enabled: true
  discovery_mode: search # search | hot | topic | feed
  frequency_seconds: 900
  lang: zh
  tier: A # S | A | B | C
  pool: evidence # evidence | background
groups:
  - group_id: zh_official_media
    name: 中文权威媒体检索入口
    defaults_override:
      tier: S
      pool: evidence
      lang: zh
      frequency_seconds: 600
    sources:
      - source_id: xinhua_search
        platform: xinhua
        name: 新华网站内搜索
        discovery_mode: search
        url_template: "https://so.news.cn/#search/{{keyword}}"
      - source_id: people_search
        platform: peoples_daily
        name: 人民网站内搜索
        discovery_mode: search
        url_template: "https://search.people.cn/s/?keyword={{keyword}}"
      - source_id: cctv_search
        platform: news
        name: 央视网站内搜索
        discovery_mode: search
        url_template: "https://search.cctv.com/search.php?qtext={{keyword}}"
      - source_id: china_gov_feed
        platform: china_gov
        name: 国务院要闻频道
        discovery_mode: feed
        url_template: "https://www.gov.cn/yaowen/index.htm"
        frequency_seconds: 1800
      - source_id: nhc_updates
        platform: nhc
        name: 国家卫健委要闻
        discovery_mode: feed
        url_template: "http://www.nhc.gov.cn/xcs/yqtb/list_gzbd.shtml"
        frequency_seconds: 1800
  - group_id: zh_social_platforms
    name: 中文社媒与平台入口
    defaults_override:
      tier: B
      pool: evidence
      lang: zh
      frequency_seconds: 600
    sources:
      - source_id: weibo_search
        platform: weibo
        name: 微博关键词搜索
        discovery_mode: search
        url_template: "https://s.weibo.com/weibo?q={{keyword}}"
      - source_id: weibo_hot
        platform: weibo
        name: 微博热搜
        discovery_mode: hot
        url_template: "https://s.weibo.com/top/summary"
      - source_id: zhihu_search
        platform: zhihu
        name: 知乎搜索
        discovery_mode: search
        url_template: "https://www.zhihu.com/search?type=content&q={{keyword}}"
      - source_id: zhihu_hot
        platform: zhihu
        name: 知乎热搜
        discovery_mode: hot
        url_template: "https://www.zhihu.com/topsearch"
      - source_id: bilibili_search
        platform: bilibili
        name: B站搜索
        discovery_mode: search
        url_template: "https://search.bilibili.com/all?keyword={{keyword}}"
      - source_id: bilibili_hot
        platform: bilibili
        name: B站热搜
        discovery_mode: hot
        url_template: "https://www.bilibili.com/blackboard/activity-trending-topic.html"
      - source_id: douyin_hot
        platform: douyin
        name: 抖音热榜
        discovery_mode: hot
        url_template: "https://www.douyin.com/hot"
        tier: C
        pool: background
  - group_id: global_background
    name: 国际背景补充源
    defaults_override:
      tier: B
      lang: en
      pool: background
      frequency_seconds: 1800
    sources:
      - source_id: reuters_world
        platform: reuters
        name: Reuters World
        discovery_mode: feed
        url_template: "https://www.reuters.com/world/"
      - source_id: bbc_world
        platform: bbc
        name: BBC World
        discovery_mode: feed
        url_template: "https://www.bbc.com/news/world"
      - source_id: guardian_world
        platform: guardian
        name: Guardian World
        discovery_mode: feed
        url_template: "https://www.theguardian.com/world"
